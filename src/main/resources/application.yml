spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/razorpay_webhook}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
  lifecycle:
    timeout-per-shutdown-phase: 30s

razorpay:
  base-url: ${RAZORPAY_BASE_URL:https://api.razorpay.com}
  key-id: ${RAZORPAY_KEY_ID:test_key}
  key-secret: ${RAZORPAY_KEY_SECRET:test_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:test_webhook_secret}

jwt:
  secret: ${JWT_SECRET:dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtYXQtbGVhc39uZw==}
  expiry-seconds: ${JWT_EXPIRY:3600}

ml:
  service:
    base-url: ${ML_SERVICE_URL:http://ml-service:8000}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  management:
    endpoints:
      web:
        exposure:
          include: health, prometheus
    endpoint:
      health:
        show-details: never
      prometheus:
        enabled: true
    metrics:
      export:
        prometheus:
          enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.example.razorpaywebhook: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs
  paths-to-match: /**